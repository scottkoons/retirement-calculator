<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retirement Calculator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <h1>Retirement Calculator</h1>
      <span id="save-status" class="save-status ok">All changes saved</span>
    </div>
    <nav class="tabs">
      <button class="tab-btn" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="scenarios">Scenarios</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </nav>
    <div class="backup">
      <button class="btn small" data-action="backup-download" title="Save a copy to a file">Download backup</button>
      <button class="btn small" data-action="backup-restore" title="Load a backup file">Restore backup</button>
      <input type="file" id="restore-input" accept="application/json" hidden>
    </div>
  </header>

  <main id="main"></main>

  <footer class="app-footer">
    <p>Your data saves automatically in this browser. Use <strong>Download backup</strong> to keep a copy or move to another computer. This tool is for personal planning estimates only — not financial advice.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
