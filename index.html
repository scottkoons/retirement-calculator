<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A free, private retirement planner. Build and compare what-if scenarios — Social Security claiming ages, lump sums, contributions and spending — with automatic saving.">
  <meta name="theme-color" content="#0a0e14">
  <title>Retirement Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script>
    // Apply saved theme before first paint to avoid a flash.
    (function () {
      try {
        var raw = localStorage.getItem('retirementApp.v1');
        var t = raw ? (JSON.parse(raw).theme) : null;
        if (!t) t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
    })();
  </script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"></path>
          <path d="M19 9l-5 5-4-4-4 4"></path>
        </svg>
      </span>
      <div class="brand-text">
        <h1>Retirement<span class="brand-dim">Calc</span></h1>
        <span id="save-status" class="save-status ok">All changes saved</span>
      </div>
    </div>

    <div id="scenario-pills" class="scenario-pills"></div>

    <nav class="tabs" role="tablist" aria-label="Sections">
      <button class="tab-btn" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="scenarios">Scenarios</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </nav>

    <div class="backup">
      <button class="btn small ghost icon-only" id="theme-toggle" data-action="toggle-theme" title="Switch light / dark theme" aria-label="Switch light or dark theme">
        <span class="btn-ico theme-ico" aria-hidden="true"></span>
      </button>
      <button class="btn small ghost" data-action="backup-download" title="Save a copy to a file">
        <span class="btn-ico" aria-hidden="true">↓</span> Backup
      </button>
      <button class="btn small ghost" data-action="backup-restore" title="Load a backup file">
        <span class="btn-ico" aria-hidden="true">↑</span> Restore
      </button>
      <input type="file" id="restore-input" accept="application/json" hidden>
    </div>
  </header>

  <main id="main"></main>

  <footer class="app-footer">
    <p>Your data saves automatically in this browser. Use <strong>Backup</strong> to keep a copy or move to another computer. This tool is for personal planning estimates only — not financial advice.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
